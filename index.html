<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Analytics | 馬拉松數據分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-blue-900">Marathon Analytics</h1>
                <p class="text-gray-500 mt-2">賽事數據深度探索</p>
            </div>
            <select id="raceSelect" class="border p-2 rounded shadow-sm">
                <option value="2026_Tokyo.csv">2026 東京馬拉松</option>
            </select>
        </header>

        <div id="loading" class="text-center text-xl text-blue-600 font-bold my-10 animate-pulse">
            ⏳ 正在載入與解析賽事數據中，請稍候...
        </div>

        <div id="dashboard" class="hidden">
            <h2 class="text-2xl font-bold border-b-2 border-blue-200 pb-2 mb-4">1. 參賽者輪廓 (Demographics)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-center font-bold mb-2">男女比例</h3>
                    <div class="relative h-64"><canvas id="genderChart"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-center font-bold mb-2">參賽國家 Top 10</h3>
                    <div class="relative h-64"><canvas id="nationChart"></canvas></div>
                </div>
            </div>

            <h2 class="text-2xl font-bold border-b-2 border-blue-200 pb-2 mb-4 mt-8">2. 豐狂賽事洞察 (Advanced Insights)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-center font-bold mb-2">完賽時間分佈 (Sub3, Sub4...)</h3>
                    <div class="relative h-64"><canvas id="finishTimeChart"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-center font-bold mb-2">各年齡層平均完賽時間</h3>
                    <div class="relative h-64"><canvas id="ageTimeChart"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-center font-bold mb-2">配速策略與撞牆期分析</h3>
                    <div class="relative h-64"><canvas id="wallChart"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded shadow flex flex-col justify-center items-center text-center">
                    <h3 class="font-bold text-gray-500 mb-2">資料總筆數</h3>
                    <p id="totalRunners" class="text-5xl font-extrabold text-blue-600">-</p>
                    <p class="text-sm text-gray-400 mt-2">基於有效成績計算</p>
                </div>
            </div>

            <h2 class="text-2xl font-bold border-b-2 border-blue-200 pb-2 mb-4">3. 個人戰力查詢 (Runner Search)</h2>
            <div class="bg-white p-6 rounded shadow mb-10">
                <div class="flex gap-4 mb-4">
                    <input type="text" id="bibInput" placeholder="輸入號碼布 (Bib)" class="border p-2 rounded w-full md:w-1/3">
                    <button onclick="searchRunner()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">查詢</button>
                </div>
                <div id="searchResult" class="hidden bg-blue-50 p-4 rounded border border-blue-100"></div>
            </div>
        </div>
    </div>

    <script>
let allRunners = [];
        let charts = {};

        function timeToSec(timeStr) {
            if (!timeStr || timeStr === '-' || timeStr === 'NaN') return null;
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            return null;
        }

        function timeToHours(timeStr) {
            let secs = timeToSec(timeStr);
            return secs ? secs / 3600 : null;
        }

        window.onload = () => {
            document.getElementById('loading').style.display = 'block';
            Papa.parse(`./data/2026_Tokyo.csv`, { 
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allRunners = results.data;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('totalRunners').innerText = allRunners.length.toLocaleString();
                    initCharts();
                },
                error: function() { alert("載入資料失敗！請確認檔案路徑。"); }
            });
        };

        function initCharts() {
            let maleCount = 0, femaleCount = 0;
            let nations = {};
            
            // 🌟 1. 建立男女分開的資料容器
            let timeDist = { '男': { 'Sub 3':0, 'Sub 4':0, 'Sub 5':0, 'Sub 6':0, '6小時+':0 }, '女': { 'Sub 3':0, 'Sub 4':0, 'Sub 5':0, 'Sub 6':0, '6小時+':0 } };
            let ageGroups = { '男': {}, '女': {} };
            let pacingStats = { '男': { '完美配速':0, '平穩完賽':0, '撞牆期':0, '嚴重撞牆':0 }, '女': { '完美配速':0, '平穩完賽':0, '撞牆期':0, '嚴重撞牆':0 } };

            allRunners.forEach(r => {
                let gender = '未知';
                if (r.Sex && r.Sex.includes('男')) { gender = '男'; maleCount++; }
                else if (r.Sex && r.Sex.includes('女')) { gender = '女'; femaleCount++; }

                if (r.Nationality) nations[r.Nationality] = (nations[r.Nationality] || 0) + 1;

                if (gender === '男' || gender === '女') {
                    // 完賽時間
                    let netHours = timeToHours(r['Net Time']);
                    if (netHours) {
                        if (netHours < 3) timeDist[gender]['Sub 3']++;
                        else if (netHours < 4) timeDist[gender]['Sub 4']++;
                        else if (netHours < 5) timeDist[gender]['Sub 5']++;
                        else if (netHours < 6) timeDist[gender]['Sub 6']++;
                        else timeDist[gender]['6小時+']++;
                    }

                    // 年齡層
                    let age = parseInt(r.Age);
                    if (age && netHours) {
                        let group = Math.floor(age/10)*10 + '代';
                        if (age < 20) group = '20以下';
                        if (!ageGroups[gender][group]) ageGroups[gender][group] = {sum:0, count:0};
                        ageGroups[gender][group].sum += netHours;
                        ageGroups[gender][group].count++;
                    }

                    // 撞牆期
                    let halfSec = timeToSec(r['中間点／Halfway Point_Inter']);
                    let fullSec = timeToSec(r['Net Time']);
                    if (halfSec && fullSec) {
                        let firstHalf = halfSec;
                        let secondHalf = fullSec - halfSec;
                        if (secondHalf < firstHalf) pacingStats[gender]['完美配速']++;
                        else if (secondHalf > firstHalf * 1.20) pacingStats[gender]['嚴重撞牆']++;
                        else if (secondHalf > firstHalf * 1.10) pacingStats[gender]['撞牆期']++;
                        else pacingStats[gender]['平穩完賽']++;
                    }
                }
            });

            // 圖表共同配色設定
            const maleColor = '#3b82f6';   // 藍色
            const femaleColor = '#ec4899'; // 粉色

            if(charts.gender) charts.gender.destroy();
            charts.gender = new Chart(document.getElementById('genderChart'), {
                type: 'doughnut',
                data: { labels: ['男性', '女性'], datasets: [{ data: [maleCount, femaleCount], backgroundColor: [maleColor, femaleColor] }] },
                options: { maintainAspectRatio: false }
            });

            let topNations = Object.entries(nations).sort((a,b) => b[1] - a[1]).slice(0, 10);
            if(charts.nation) charts.nation.destroy();
            charts.nation = new Chart(document.getElementById('nationChart'), {
                type: 'bar',
                data: { labels: topNations.map(n => n[0]), datasets: [{ label: '人數', data: topNations.map(n => n[1]), backgroundColor: '#10b981' }] },
                options: { maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            // 🌟 2. 男女對比：完賽時間分佈
            if(charts.finish) charts.finish.destroy();
            charts.finish = new Chart(document.getElementById('finishTimeChart'), {
                type: 'bar',
                data: { 
                    labels: Object.keys(timeDist['男']), 
                    datasets: [
                        { label: '男性', data: Object.values(timeDist['男']), backgroundColor: maleColor },
                        { label: '女性', data: Object.values(timeDist['女']), backgroundColor: femaleColor }
                    ] 
                },
                options: { maintainAspectRatio: false }
            });

            // 🌟 3. 男女對比：各年齡層平均完賽時間
            let ageLabels = Array.from(new Set([...Object.keys(ageGroups['男']), ...Object.keys(ageGroups['女'])])).sort();
            let maleAverages = ageLabels.map(g => ageGroups['男'][g] ? (ageGroups['男'][g].sum / ageGroups['男'][g].count) : null);
            let femaleAverages = ageLabels.map(g => ageGroups['女'][g] ? (ageGroups['女'][g].sum / ageGroups['女'][g].count) : null);
            
            if(charts.age) charts.age.destroy();
            charts.age = new Chart(document.getElementById('ageTimeChart'), {
                type: 'line',
                data: { 
                    labels: ageLabels, 
                    datasets: [
                        { label: '男性平均 (小時)', data: maleAverages, borderColor: maleColor, tension: 0.3, spanGaps: true },
                        { label: '女性平均 (小時)', data: femaleAverages, borderColor: femaleColor, tension: 0.3, spanGaps: true }
                    ] 
                },
                options: { maintainAspectRatio: false, scales: { y: { min: 2.5 } } }
            });

            // 🌟 4. 男女對比：配速策略與撞牆期 (改為分組長條圖)
            if(charts.wall) charts.wall.destroy();
            charts.wall = new Chart(document.getElementById('wallChart'), {
                type: 'bar',
                data: { 
                    labels: Object.keys(pacingStats['男']), 
                    datasets: [
                        { label: '男性', data: Object.values(pacingStats['男']), backgroundColor: maleColor },
                        { label: '女性', data: Object.values(pacingStats['女']), backgroundColor: femaleColor }
                    ] 
                },
                options: { maintainAspectRatio: false }
            });
        }

        function searchRunner() {
            const bib = document.getElementById('bibInput').value.trim();
            const runner = allRunners.find(r => r.Bib === bib);
            const resDiv = document.getElementById('searchResult');
            
            if (!runner) {
                resDiv.innerHTML = `<p class="text-red-500 font-bold">找不到號碼布 ${bib} 的選手！</p>`;
                resDiv.style.display = 'block';
                return;
            }

            let runnerNetSec = timeToSec(runner['Net Time']);
            let beatOverall = 0, totalOverall = 0, beatGender = 0, totalGender = 0, beatAge = 0, totalAge = 0;
            let runnerAge = parseInt(runner.Age);
            let runnerAgeGroup = runnerAge ? (Math.floor(runnerAge/10)*10 + '代') : '未知';
            if (runnerAge < 20) runnerAgeGroup = '20以下';

            let allValidSecs = [];

            if (runnerNetSec) {
                allRunners.forEach(r => {
                    let sec = timeToSec(r['Net Time']);
                    if (sec) {
                        allValidSecs.push(sec);
                        totalOverall++;
                        if (sec > runnerNetSec) beatOverall++;

                        if (r.Sex === runner.Sex) {
                            totalGender++;
                            if (sec > runnerNetSec) beatGender++;
                        }

                        let rAge = parseInt(r.Age);
                        let g = rAge ? (Math.floor(rAge/10)*10 + '代') : '未知';
                        if (rAge < 20) g = '20以下';
                        if (g === runnerAgeGroup) {
                            totalAge++;
                            if (sec > runnerNetSec) beatAge++;
                        }
                    }
                });
            }

            let prOverall = totalOverall ? ((beatOverall / totalOverall) * 100).toFixed(1) : '-';
            let prGender = totalGender ? ((beatGender / totalGender) * 100).toFixed(1) : '-';
            let prAge = totalAge ? ((beatAge / totalAge) * 100).toFixed(1) : '-';

            resDiv.innerHTML = `
                <div class="flex flex-col gap-6">
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="flex-1 bg-white p-4 rounded shadow-sm border-t-4 border-blue-600">
                            <h3 class="text-2xl font-bold mb-4 text-blue-900">${runner.Name || '未知姓名'}</h3>
                            <p class="mb-1"><strong>大會時間 (Gross)：</strong> ${runner['Gross Time'] || '-'}</p>
                            <p class="mb-1"><strong>晶片時間 (Net)：</strong> <span class="text-lg font-bold text-green-600">${runner['Net Time'] || '-'}</span></p>
                            <p class="mb-1"><strong>總排名：</strong> ${runner['Overall Place'] || '-'}</p>
                            <p class="mb-1"><strong>組別/國籍：</strong> ${runner['Race Category'] || '-'} / ${runner.Nationality || '-'}</p>
                            <p class="mb-1"><strong>年齡/性別：</strong> ${runner.Age || '-'} 歲 / ${runner.Sex || '-'}</p>
                        </div>
                        
                        <div class="flex-1 bg-gradient-to-br from-yellow-50 to-yellow-100 p-4 rounded shadow-sm border-t-4 border-yellow-500">
                            <h3 class="text-xl font-bold mb-4 text-yellow-800">🏆 戰力分析 (PR 值)</h3>
                            <div class="mb-3">
                                <span class="text-gray-600 text-sm">全場擊敗比例</span>
                                <div class="text-3xl font-black text-yellow-600">PR ${prOverall} <span class="text-sm font-normal text-gray-500">(${beatOverall}/${totalOverall}人)</span></div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-yellow-200 text-center">
                                <div class="bg-yellow-50 rounded p-2">
                                    <span class="text-gray-500 text-xs block mb-1">同性別擊敗</span>
                                    <span class="font-bold text-xl text-yellow-700">${prGender}%</span>
                                </div>
                                <div class="bg-yellow-50 rounded p-2">
                                    <span class="text-gray-500 text-xs block mb-1">同年齡層擊敗</span>
                                    <span class="font-bold text-xl text-yellow-700">${prAge}%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                        <div class="bg-white p-4 rounded shadow-sm">
                            <h4 class="text-center font-bold text-gray-600 text-sm mb-2">完賽時間累積分布圖</h4>
                            <div class="relative h-64 md:h-80 w-full"><canvas id="prChart"></canvas></div>
                        </div>
                        <div class="bg-white p-4 rounded shadow-sm">
                            <h4 class="text-center font-bold text-gray-600 text-sm mb-2">每公里配速 (智慧撞牆檢測)</h4>
                            <div class="relative h-64 md:h-80 w-full"><canvas id="lapChart"></canvas></div>
                        </div>
                    </div>
                </div>
            `;
            resDiv.style.display = 'block';

            if (window.prChartInstance) window.prChartInstance.destroy();
            if (runnerNetSec && allValidSecs.length > 0) {
                allValidSecs.sort((a, b) => a - b);
                let ecdfLabels = [], ecdfData = [], currentIdx = 0, totalRunnersCount = allValidSecs.length;

                for (let sec = 7200; sec <= 25200; sec += 300) {
                    while (currentIdx < totalRunnersCount && allValidSecs[currentIdx] <= sec) currentIdx++;
                    ecdfLabels.push(`${Math.floor(sec / 3600)}:${Math.floor((sec % 3600) / 60).toString().padStart(2, '0')}`);
                    ecdfData.push(((totalRunnersCount - currentIdx) / totalRunnersCount) * 100);
                }

                const ctxPr = document.getElementById('prChart').getContext('2d');
                window.prChartInstance = new Chart(ctxPr, {
                    type: 'line',
                    data: {
                        labels: ecdfLabels,
                        datasets: [
                            { label: '累積分布', data: ecdfData, borderColor: '#93c5fd', backgroundColor: 'rgba(147, 197, 253, 0.2)', fill: true, pointRadius: 0, tension: 0.4 },
                            { type: 'scatter', label: '你的落點', data: [{ x: `${Math.floor(runnerNetSec / 3600)}:${Math.floor((runnerNetSec % 3600) / 60).toString().padStart(2, '0')}`, y: parseFloat(prOverall) }], backgroundColor: '#ef4444', pointRadius: 8, pointBorderColor: '#fff', pointBorderWidth: 2 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { max: 100, min: 0 } } }
                });
            }

            // 🌟 5. 進階配速圖：計算全局平均並標示撞牆期
            if (window.lapChartInstance) window.lapChartInstance.destroy();
            const checkpoints = [
                { label: '5km', field: '5km_Inter', dist: 5 }, { label: '10km', field: '10km_Inter', dist: 10 },
                { label: '15km', field: '15km_Inter', dist: 15 }, { label: '20km', field: '20km_Inter', dist: 20 },
                { label: '25km', field: '25km_Inter', dist: 25 }, { label: '30km', field: '30km_Inter', dist: 30 },
                { label: '35km', field: '35km_Inter', dist: 35 }, { label: '40km', field: '40km_Inter', dist: 40 },
                { label: 'Finish', field: 'フィニッシュ／Finish_Inter', dist: 42.195 }
            ];

            const chartLabels = [], chartData = [], tooltipText = [];
            let prevSec = 0, prevDist = 0;
            
            // 計算全局平均配速 (基準線)
            const avgPaceSec = runnerNetSec ? (runnerNetSec / 42.195) : null;
            const avgPaceMin = avgPaceSec ? (avgPaceSec / 60) : null;
            const avgPaceStr = avgPaceSec ? `${Math.floor(avgPaceSec / 60)}:${Math.round(avgPaceSec % 60).toString().padStart(2, '0')}` : '';

            checkpoints.forEach(pt => {
                const currentSec = timeToSec(runner[pt.field]);
                const segLabel = `${prevDist === 0 ? '0' : prevDist}-${pt.dist === 42.195 ? 'Finish' : pt.dist + 'km'}`;

                if (currentSec !== null) {
                    const paceSecPerKm = (currentSec - prevSec) / (pt.dist - prevDist);
                    chartData.push(paceSecPerKm / 60);
                    tooltipText.push(`${Math.floor(paceSecPerKm / 60)}:${Math.round(paceSecPerKm % 60).toString().padStart(2, '0')} /km`);
                    chartLabels.push(segLabel);
                    prevSec = currentSec; prevDist = pt.dist;
                } else {
                    chartData.push(null); tooltipText.push('無資料'); chartLabels.push(segLabel);
                }
            });

            // 動態顏色函數：慢於平均10%顯示紅色
            const getPointColor = (ctx) => {
                if (avgPaceMin && ctx.raw > avgPaceMin * 1.1) return '#ef4444'; // 撞牆紅
                return '#f59e0b'; // 正常橘
            };

            const ctxLap = document.getElementById('lapChart').getContext('2d');
            window.lapChartInstance = new Chart(ctxLap, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [
                        {
                            label: '該段配速 (紅色為掉速>10%)',
                            data: chartData,
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 2,
                            pointBackgroundColor: function(context) { return getPointColor(context); },
                            pointRadius: 6,
                            fill: true,
                            tension: 0.2
                        },
                        {
                            label: `全局平均配速 (${avgPaceStr} /km)`,
                            data: Array(chartLabels.length).fill(avgPaceMin),
                            borderColor: '#3b82f6',
                            borderDash: [5, 5], // 虛線效果
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { 
                            title: { display: true, text: '配速 (分:秒/公里)' },
                            ticks: { callback: function(val) { return Math.floor(val) + ':' + Math.round((val % 1) * 60).toString().padStart(2, '0'); } }
                        } 
                    },
                    plugins: { tooltip: { callbacks: { label: function(c) { return c.datasetIndex === 0 ? ` 實際: ${tooltipText[c.dataIndex]}` : ` 基準: ${avgPaceStr} /km`; } } } }
                }
            });
        }    </script>
</body>
</html>
