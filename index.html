<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Analytics | 馬拉松數據分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-blue-900">Marathon Analytics</h1>
                <p class="text-gray-500 mt-2">賽事數據深度探索</p>
            </div>
            <select id="raceSelect" class="border p-2 rounded shadow-sm">
                <option value="2026_Tokyo.csv">2026 東京馬拉松</option>
            </select>
        </header>

        <div id="loading" class="text-center text-xl text-blue-600 font-bold my-10 animate-pulse">
            ⏳ 正在載入與解析賽事數據中，請稍候...
        </div>

        <div id="dashboard" class="hidden">
            <h2 class="text-2xl font-bold border-b-2 border-blue-200 pb-2 mb-4">1. 參賽者輪廓 (Demographics)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-center font-bold mb-2">男女比例</h3>
                    <canvas id="genderChart"></canvas>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-center font-bold mb-2">參賽國家 Top 10</h3>
                    <canvas id="nationChart"></canvas>
                </div>
            </div>

            <h2 class="text-2xl font-bold border-b-2 border-blue-200 pb-2 mb-4">2. 個人戰力查詢 (Runner Search)</h2>
            <div class="bg-white p-6 rounded shadow mb-10">
                <div class="flex gap-4 mb-4">
                    <input type="text" id="bibInput" placeholder="輸入號碼布 (Bib)" class="border p-2 rounded w-full md:w-1/3">
                    <button onclick="searchRunner()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">查詢</button>
                </div>
                <div id="searchResult" class="hidden bg-blue-50 p-4 rounded border border-blue-100">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let allRunners = [];
        let charts = {};

        // 初始化載入資料
        function loadData(filename) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';

            Papa.parse(`./data/${filename}`, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allRunners = results.data;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    initCharts();
                },
                error: function(err) {
                    alert("載入資料失敗！請確認 /data 資料夾下有 " + filename);
                }
            });
        }

        function initCharts() {
            // 計算男女比例
            let maleCount = allRunners.filter(r => r.Sex && r.Sex.includes('男')).length;
            let femaleCount = allRunners.filter(r => r.Sex && r.Sex.includes('女')).length;

            // 計算國家分佈
            let nations = {};
            allRunners.forEach(r => {
                if(r.Nationality) {
                    nations[r.Nationality] = (nations[r.Nationality] || 0) + 1;
                }
            });
            let topNations = Object.entries(nations).sort((a,b) => b[1] - a[1]).slice(0, 10);

            // 繪製性別圓餅圖
            if(charts.gender) charts.gender.destroy();
            charts.gender = new Chart(document.getElementById('genderChart'), {
                type: 'doughnut',
                data: {
                    labels: ['男性', '女性'],
                    datasets: [{ data: [maleCount, femaleCount], backgroundColor: ['#3b82f6', '#ec4899'] }]
                }
            });

            // 繪製國家長條圖
            if(charts.nation) charts.nation.destroy();
            charts.nation = new Chart(document.getElementById('nationChart'), {
                type: 'bar',
                data: {
                    labels: topNations.map(n => n[0]),
                    datasets: [{ label: '人數', data: topNations.map(n => n[1]), backgroundColor: '#10b981' }]
                }
            });
        }

        // 查詢功能與「動態計算配速」折線圖 (無視 CSV 錯誤 Lap 欄位)
        function searchRunner() {
            const bib = document.getElementById('bibInput').value.trim();
            const runner = allRunners.find(r => r.Bib === bib);
            const resDiv = document.getElementById('searchResult');
            
            if (!runner) {
                resDiv.innerHTML = `<p class="text-red-500 font-bold">找不到號碼布 ${bib} 的選手！</p>`;
                resDiv.style.display = 'block';
                return;
            }

            // 1. 基本資料顯示區
            resDiv.innerHTML = `
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="flex-1">
                        <h3 class="text-2xl font-bold mb-4 text-blue-900">${runner.Name || '未知姓名'}</h3>
                        <p class="mb-2"><strong>總排名：</strong> ${runner['Overall Place'] || '-'}</p>
                        <p class="mb-2"><strong>大會時間 (Gross)：</strong> ${runner['Gross Time'] || '-'}</p>
                        <p class="mb-2"><strong>晶片時間 (Net)：</strong> ${runner['Net Time'] || '-'}</p>
                        <p class="mb-2"><strong>組別：</strong> ${runner['Race Category'] || '-'}</p>
                        <p class="mb-2"><strong>年齡/性別：</strong> ${runner.Age || '-'} / ${runner.Sex || '-'}</p>
                        <p class="mb-2"><strong>國籍：</strong> ${runner.Nationality || '-'}</p>
                    </div>
                    <div class="flex-1 relative min-h-[300px] bg-white p-2 rounded shadow-sm">
                        <canvas id="lapChart"></canvas>
                    </div>
                </div>
            `;
            resDiv.style.display = 'block';

            // 2. 輔助函數：將 HH:MM:SS 或 MM:SS 轉成總秒數
            function timeToSec(timeStr) {
                if (!timeStr || timeStr === '-' || timeStr === 'NaN') return null;
                const parts = timeStr.split(':').map(Number);
                if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
                if (parts.length === 2) return parts[0] * 60 + parts[1];
                return null;
            }

            // 3. 定義累積距離節點 (使用絕對可靠的 _Inter 累積時間欄位)
            const checkpoints = [
                { label: '5km', field: '5km_Inter', dist: 5 },
                { label: '10km', field: '10km_Inter', dist: 10 },
                { label: '15km', field: '15km_Inter', dist: 15 },
                { label: '20km', field: '20km_Inter', dist: 20 },
                { label: '25km', field: '25km_Inter', dist: 25 },
                { label: '30km', field: '30km_Inter', dist: 30 },
                { label: '35km', field: '35km_Inter', dist: 35 },
                { label: '40km', field: '40km_Inter', dist: 40 },
                { label: 'Finish', field: 'フィニッシュ／Finish_Inter', dist: 42.195 }
            ];

            const chartLabels = [];
            const chartData = [];
            const tooltipText = [];

            let prevSec = 0;
            let prevDist = 0;

            // 4. 動態相減計算每一段的真實配速 (免疫 CSV 錯位問題)
            checkpoints.forEach(pt => {
                const currentSec = timeToSec(runner[pt.field]);
                
                // 產生 X 軸標籤 (例如 "35-40km" 或 "40-Finish")
                const startLabel = prevDist === 0 ? '0' : prevDist;
                const endLabel = pt.dist === 42.195 ? 'Finish' : pt.dist + 'km';
                const segLabel = `${startLabel}-${endLabel}`;

                if (currentSec !== null) {
                    const lapSec = currentSec - prevSec;     // 該段花費秒數
                    const lapDist = pt.dist - prevDist;      // 該段實際距離

                    const paceSecPerKm = lapSec / lapDist;   // 配速 (秒/公里)
                    
                    chartData.push(paceSecPerKm / 60);       // Y軸畫圖用 (小數點分鐘)
                    
                    // Tooltip 顯示用 (轉回 mm:ss 格式)
                    const paceM = Math.floor(paceSecPerKm / 60);
                    const paceS = Math.round(paceSecPerKm % 60).toString().padStart(2, '0');
                    tooltipText.push(`${paceM}:${paceS} /km`);
                    chartLabels.push(segLabel);

                    // 紀錄為前一個節點，給下一段相減用
                    prevSec = currentSec;
                    prevDist = pt.dist;
                } else {
                    chartData.push(null);
                    tooltipText.push('無資料');
                    chartLabels.push(segLabel);
                }
            });

            // 5. 繪製配速折線圖
            if (window.lapChartInstance) {
                window.lapChartInstance.destroy();
            }

            const ctx = document.getElementById('lapChart').getContext('2d');
            window.lapChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: '平均配速 (往上代表掉速/變慢)',
                        data: chartData,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#d97706',
                        pointRadius: 5,
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            title: { display: true, text: '配速 (分鐘/公里)' }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ` 配速: ${tooltipText[context.dataIndex]}`;
                                }
                            }
                        }
                    }
                }
            });
        }





        // 頁面載入時啟動
        window.onload = () => loadData('2026_Tokyo.csv');

    </script>
</body>
</html>
